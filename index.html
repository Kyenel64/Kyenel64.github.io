<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Public+Sans">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
</head>
<body>
    <div id="topBar">
        <h2 id="header1">KYE NELSON</h2>
        <div id="bar"></div>
        <h2 id="header2">SOFTWARE ENGINEER AMATUER ASTRONOMER</h2>
    </div>

    <div id="main">
        <span id="Mercury" onclick="openSite('github')">
            <div class="label">
                <div class="line"></div>
                <h2 class="labelText">GitHub</h2>
            </div>
        </span>
        <span id="Venus" onclick="openSite('linkedin')">
            <div class="label">
                <div class="line"></div>
                <h2 class="labelText">LinkedIn</h2>
            </div>
        </span>
        <span id="Earth" onclick="openSite('home')">
            <div class="label">
                <div class="line"></div>
                <h2 class="labelText">Home</h2>
            </div>
        </span>
        <span id="Mars" onclick="expand('Mars')">
            <div class="label">
                <div class="line"></div>
                <h2 class="labelText">About Me</h2>
            </div>
        </span>
        <span id="Jupiter" onclick="expand('Jupiter')">
            <div class="label">
                <div class="line"></div>
                <h2 class="labelText">Astrophotography</h2>
            </div>
        </span>
        <span id="Saturn" onclick="expand('Saturn')">
            <div class="label">
                <div class="line"></div>
                <h2 class="labelText">NOAA</h2>
            </div>
        </span>
        <span id="Uranus" onclick="expand('Uranus')">
            <div class="label">
                <div class="line"></div>
                <h2 class="labelText">AStar Engine</h2>
            </div>
        </span>
        <span id="Neptune" onclick="expand('Neptune')">
            <div class="label">
                <div class="line"></div>
                <h2 class="labelText">Contact Me</h2>
            </div>
        </span>
    </div>

    <div class="pages" id="MarsPage"></div>
    <div class="pages" id="JupiterPage"></div>
    <div class="pages" id="SaturnPage"></div>
    <div class="pages" id="UranusPage"></div>
    <div class="pages" id="NeptunePage"></div>
    

    <div id="bottomBar">

    </div>

    <script src="main.js"></script>
</body>
</html>
